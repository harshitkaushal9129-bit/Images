<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Thumbnail Injector</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/727/727218.png">

    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 380px; text-align: center; }
        h2 { margin-top: 0; color: #f8fafc; font-size: 1.5rem; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-size: 0.9rem; color: #94a3b8; }
        input { margin-bottom: 20px; width: 100%; color: #94a3b8; background: #0f172a; padding: 8px; border-radius: 5px; border: 1px solid #334155; }
        button { background: #22c55e; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.3s ease; font-size: 1rem; }
        button:hover { background: #16a34a; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .status { margin-top: 20px; font-size: 0.85rem; padding: 10px; border-radius: 8px; background: rgba(251, 191, 36, 0.1); color: #fbbf24; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Audio Thumbnail Tool</h2>
    
    <label>1. Select MP3 Audio:</label>
    <input type="file" id="audioInput" accept="audio/mpeg, audio/mp3">
    
    <label>2. Select Cover Image (JPG/PNG):</label>
    <input type="file" id="imageInput" accept="image/jpeg, image/png">
    
    <button onclick="processAudio()">Inject & Download</button>
    
    <div class="status" id="status">Files select karke "Inject" par click karein.</div>
</div>

<script>
// 1. Service Worker Registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("PWA Active"))
            .catch(err => console.log("SW Error", err));
    });
}

// 2. Audio Processing Logic
async function processAudio() {
    const audioFile = document.getElementById('audioInput').files[0];
    const imageFile = document.getElementById('imageInput').files[0];
    const status = document.getElementById('status');

    if (!audioFile || !imageFile) {
        alert("Kripya dono files (Audio aur Image) select karein!");
        return;
    }

    status.innerText = "Processing... Please wait.";

    try {
        // Buffers read karein
        const audioBuffer = await audioFile.arrayBuffer();
        const imageBuffer = await imageFile.arrayBuffer();

        // ID3 Writer Setup
        const writer = new ID3Writer(audioBuffer);
        
        // Front Cover (Type 3) add karein
        writer.setFrame('APIC', {
            type: 3,
            data: imageBuffer,
            description: 'Cover',
            usePictureTypeFromData: true
        });

        // Song Title set karein (Filename se extension hatakar)
        const cleanTitle = audioFile.name.replace(/\.[^/.]+$/, "");
        writer.setFrame('TIT2', cleanTitle);

        writer.addTag();

        // Final Blob generate karein
        const taggedUint8 = writer.arrayBuffer;
        const finalBlob = new Blob([taggedUint8], { type: 'audio/mpeg' });
        
        // Download Trigger
        const url = URL.createObjectURL(finalBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Covered_" + audioFile.name;
        document.body.appendChild(a);
        a.click();
        
        // Memory Cleanup
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 200);

        status.style.color = "#4ade80";
        status.innerText = "Done! Audio download ho gaya.";
        
    } catch (error) {
        console.error(error);
        status.style.color = "#f87171";
        status.innerText = "Error: File process nahi ho saki.";
    }
}
</script>

</body>
</html>
