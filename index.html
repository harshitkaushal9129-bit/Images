<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Thumbnail Tool</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/727/727218.png">

    <script src="https://unpkg.com/browser-id3-writer@4.4.0/dist/browser-id3-writer.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        h2 { color: #f8fafc; margin-bottom: 20px; }
        .box { background: #0f172a; border: 1px dashed #334155; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; text-align: left; }
        input { width: 100%; color: #94a3b8; font-size: 0.8rem; }
        button { background: #22c55e; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 1rem; margin-top: 10px; }
        button:hover { background: #16a34a; transform: scale(1.02); }
        .status { margin-top: 15px; font-size: 0.85rem; color: #fbbf24; min-height: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Audio Tool</h2>
    
    <div class="box">
        <label>MP3 Audio File:</label>
        <input type="file" id="audioInput" accept="audio/mpeg, audio/mp3">
    </div>

    <div class="box">
        <label>Cover Image (JPG/PNG):</label>
        <input type="file" id="imageInput" accept="image/jpeg, image/png">
    </div>
    
    <button id="processBtn" onclick="processAudio()">Inject & Download</button>
    
    <div class="status" id="status">Files select karein...</div>
</div>

<script>
// Service Worker Register
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
}

async function processAudio() {
    const audioInput = document.getElementById('audioInput');
    const imageInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const btn = document.getElementById('processBtn');

    if (!audioInput.files[0] || !imageInput.files[0]) {
        alert("Audio aur Image dono select karein!");
        return;
    }

    // Processing Start
    status.innerText = "Processing... Zyada memory use ho sakti hai.";
    btn.disabled = true;
    btn.style.opacity = "0.5";

    try {
        const audioFile = audioInput.files[0];
        const imageFile = imageInput.files[0];

        // Read files as ArrayBuffer
        const [audioBuffer, imageBuffer] = await Promise.all([
            audioFile.arrayBuffer(),
            imageFile.arrayBuffer()
        ]);

        // ID3 Writer Logic
        const writer = new ID3Writer(audioBuffer);
        
        // Add Image
        writer.setFrame('APIC', {
            type: 3,
            data: imageBuffer,
            description: 'Cover',
            usePictureTypeFromData: true
        });

        // Add Title (Cleanup filename)
        const title = audioFile.name.replace(/\.[^/.]+$/, "");
        writer.setFrame('TIT2', title);

        writer.addTag();

        // Memory Safe Blob Creation
        const resultBuffer = writer.arrayBuffer;
        const finalBlob = new Blob([new Uint8Array(resultBuffer)], { type: 'audio/mpeg' });
        
        // Automatic Download
        const url = URL.createObjectURL(finalBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Covered_" + audioFile.name;
        document.body.appendChild(a);
        a.click();
        
        // Immediate Memory Cleanup
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            status.style.color = "#4ade80";
            status.innerText = "Download Success! Check your music player.";
            btn.disabled = false;
            btn.style.opacity = "1";
        }, 500);

    } catch (error) {
        console.error(error);
        status.style.color = "#f87171";
        status.innerText = "Error: File process nahi hui. Chhoti image try karein.";
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}
</script>

</body>
</html>
